name: Build Windows EXE

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller

    - name: Build EXE with PyInstaller
      run: |
        pyinstaller --onedir --windowed --name VNCRemoteDesktop --icon assets/app_icon.ico --add-data "assets/app_icon.ico;assets" --add-data "assets/app_icon.png;assets" --exclude-module PIL --exclude-module numpy --exclude-module matplotlib --exclude-module pandas --exclude-module scipy --exclude-module pytest main.py

    - name: Upload EXE artifact
      uses: actions/upload-artifact@v4
      with:
        name: VNC-RemoteDesktop-Windows
        path: dist/
        retention-days: 30
